name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: WritingHub
        run: swift build

      - name: Test
        working-directory: WritingHub
        run: swift test
